async function hashPin(pin){

/* ── IDB ── */
async function idbOpen(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open("TowerReportV5",1);
    r.onupgradeneeded = e => e.target.result.createObjectStore("drafts",{keyPath:"id"});
    r.onsuccess = e => res(e.target.result);
    r.onerror = ()=>rej();
  });
}
async function idbSave(data){
  try{ const db=await idbOpen(); const tx=db.transaction("drafts","readwrite"); tx.objectStore("drafts").put(data); await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j;}); db.close(); return true; }
  catch(e){ console.warn("IDB save",e); return false; }
}
async function idbDelete(id){
  try{ const db=await idbOpen(); const tx=db.transaction("drafts","readwrite"); tx.objectStore("drafts").delete(id); await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j;}); db.close(); }
  catch(e){}
}

/* ── PHOTO PROCESSING ── */
async function processPhoto(dataUrl, gps){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = () => {
      const MAX=500; let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext("2d"); ctx.drawImage(img,0,0,w,h);
      const now=new Date();
      const ds=now.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
      const ts=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const barH=Math.max(24,Math.round(h*0.05));
      ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(0,h-barH,w,barH);
      const fs=Math.max(9,Math.round(barH*0.5));
      ctx.font=`bold ${fs}px Barlow,Arial,sans-serif`; ctx.fillStyle="#fff"; ctx.textBaseline="middle";
      ctx.fillText(`${ds} ${ts}`,6,h-barH/2);
      if(gps){ ctx.textAlign="right"; ctx.fillText(`GPS: ${gps}`,w-6,h-barH/2); ctx.textAlign="left"; }
      resolve(canvas.toDataURL("image/jpeg",0.55));
    };
    img.onerror = ()=>resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function processAllPhotos(photos,gps,onProgress,siteId){
  const results=[];
  const ds=new Date().toISOString().split("T")[0].replace(/-/g,"");
  const site=(siteId||"SITE").replace(/[^a-zA-Z0-9]/g,"-").toUpperCase();
  for(let i=0;i<photos.length;i++){
    const url=await processPhoto(photos[i].url,gps);
    onProgress&&onProgress(i+1,photos.length);
    results.push({name:`${site}_${ds}_${String(i+1).padStart(2,"0")}.jpg`,url});
  }
  return results;
}

/* ── CSV EXPORT ── */
function exportCSV(reports){
  const hdr=["ID","Site ID","Engineer","Date","Status","Equipment","GPS","Notes","Photos","Checklist"];
  const rows=reports.map(r=>[r.id,r.siteId,r.engineer,r.date,r.status,(r.equipment||[]).join("|"),r.gps||"",(r.notes||"").replace(/\n/g," "),r.photos||0,CHECKLIST.filter(i=>(r.checklist||{})[i.id]).length+"/"+CHECKLIST.length].map(v=>`"${String(v).replace(/"/g,'""')}"`));
  const csv=[hdr,...rows].map(r=>r.join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`reports_${today()}.csv`; a.click(); URL.revokeObjectURL(url);
}

function LoginScreen({onLogin}){

    if(checking)return; setChecking(true);
    const h=await hashPin(pin);
    if(h===PIN_HASHES[role]){ onLogin(role); }
    else{ setErr(true); setShake(true); setPin(""); setTimeout(()=>setShake(false),500); }

/* ══ FIX PHOTOS ══ */
function FixPhotosView({report,onDone,onBack,push}){
  const [replacements,setReplacements]=useState({});
  const [fixing,setFixing]=useState(false);
  const [fixingIdx,setFixingIdx]=useState(null);
  const camRef=useRef(); const galRef=useRef();
  const flags=report.photoFlags||{};
  const allPhotos=report.photoData||[];

  const onFile=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=ev=>setReplacements(p=>({...p,[fixingIdx]:{name:f.name,url:ev.target.result}})); r.readAsDataURL(f); e.target.value="";
  };
  const sendFixed=async()=>{
    if(!Object.keys(replacements).length){alert("You haven't replaced any photo.");return;}
    setFixing(true);
    const processed=[];
    for(let i=0;i<allPhotos.length;i++){
      if(replacements[i]){const url=await processPhoto(replacements[i].url,report.gps);processed.push({name:replacements[i].name,url});}
      else processed.push(allPhotos[i]);
    }
    const newFlags={...flags}; Object.keys(replacements).forEach(i=>{delete newFlags[i];});
    if(firebaseOK&&report.fbKey) await fbUpdate(report.fbKey,{photoData:processed,photoFlags:newFlags,photos:processed.length});
    push("✅ Photos updated","Manager sees changes instantly","ok");
    setFixing(false); onDone();
  };

  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>← Back</button>
        <h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Fix Photos — {report.siteId}</h2>
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{position:"fixed",opacity:0,pointerEvents:"none",width:1,height:1,top:0,left:0}} onChange={onFile}/>
        <input ref={galRef} type="file" accept="image/*" style={{position:"fixed",opacity:0,pointerEvents:"none",width:1,height:1,top:0,left:0}} onChange={onFile}/>
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:13,color:"#374151"}}><span style={{fontWeight:700}}>Red = needs fixing.</span> Use 📸/🖼️ buttons below photo:</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {allPhotos.map((p,i)=>{const isFlagged=!!flags[i];const replaced=replacements[i];return(
              <div key={i} style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{borderRadius:10,overflow:"hidden",aspectRatio:"1",border:`3px solid ${replaced?"#10b981":isFlagged?"#ef4444":"#d1fae5"}`,position:"relative"}}>
                  <img src={replaced?replaced.url:p.url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"3px",textAlign:"center",fontSize:9,fontWeight:800,background:replaced?"rgba(16,185,129,.9)":isFlagged?"rgba(239,68,68,.85)":"rgba(16,185,129,.75)",color:"#fff"}}>{replaced?"✓ REPLACED":isFlagged?"⚠️ TO FIX":"✓ OK"}</div>
                </div>
                {isFlagged&&(
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setFixingIdx(i);setTimeout(()=>camRef.current.click(),50);}} style={{flex:1,padding:"5px",borderRadius:7,border:"1.5px solid #fed7aa",background:"#fff7ed",color:"#ea580c",fontWeight:800,cursor:"pointer",fontSize:12}}>📸</button>
                    <button onClick={()=>{setFixingIdx(i);setTimeout(()=>galRef.current.click(),50);}} style={{flex:1,padding:"5px",borderRadius:7,border:"1.5px solid #c7d2fe",background:"#eef2ff",color:"#4f46e5",fontWeight:800,cursor:"pointer",fontSize:12}}>🖼️</button>
                  </div>
                )}
              </div>);})}
          </div>
          {Object.keys(replacements).length>0&&<div style={{background:"#d1fae5",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#065f46"}}>✓ Replaced {Object.keys(replacements).length} of {Object.values(flags).filter(Boolean).length} flagged photos</div>}
          <button onClick={sendFixed} disabled={fixing} style={{padding:"14px",borderRadius:12,border:"none",background:fixing?"#e2e8f0":"linear-gradient(135deg,#f97316,#ea580c)",color:fixing?"#9ca3af":"#fff",fontWeight:900,cursor:fixing?"not-allowed":"pointer",fontSize:15}}>{fixing?"⏳ Uploading...":"💾 Submit fixed photos"}</button>
        </div>
      </div>
    </div>
  );
}

/* ══ EDIT REPORT ══ */
function EditReportView({report,onSave,onBack,push}){
  const [form,setForm]=useState({status:report.status||"In Progress",notes:report.notes||"",equipment:report.equipment||[],checklist:report.checklist||{}});
  const [photos,setPhotos]=useState([]);
  const [saving,setSaving]=useState(false);
  const [progress,setProgress]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=eq=>set("equipment",form.equipment.includes(eq)?form.equipment.filter(e=>e!==eq):[...form.equipment,eq]);
  const togCk=id=>set("checklist",{...form.checklist,[id]:!form.checklist[id]});
  const ckDone=CHECKLIST.filter(i=>form.checklist[i.id]).length;

  const save=async()=>{
    setSaving(true);
    let newPhotos=report.photoData||[];
    if(photos.length>0){
      setProgress({current:0,total:photos.length});
      const processed=await processAllPhotos(photos,report.gps,(cur,tot)=>setProgress({current:cur,total:tot}),report.siteId);
      newPhotos=[...(report.photoData||[]),...processed];
      setProgress(null);
    }
    const update={status:form.status,notes:form.notes,equipment:form.equipment,checklist:form.checklist,photoData:newPhotos,photos:newPhotos.length,lastEdited:new Date().toISOString()};
    if(firebaseOK&&report.fbKey) await fbUpdate(report.fbKey,update);
    push("✅ Report updated","Manager sees changes instantly","ok");
    setSaving(false); onSave();
  };

  const inp={width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,outline:"none",fontFamily:"inherit",background:"#fff",boxSizing:"border-box"};
  const lbl={fontSize:11,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,display:"block"};

  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>← Back</button>
        <h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Edit Report — {report.siteId}</h2>
        <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#92400e",fontWeight:600}}>ℹ️ Update notes, status, add photos or complete checklist. Previous photos are kept.</div>
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={lbl}>Status</label>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(SC).map(([s,sc])=>{const a=form.status===s;return(
                <button key={s} onClick={()=>set("status",s)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"2px solid",borderColor:a?sc.dot:"#e2e8f0",background:a?sc.bg:"#f8fafc",color:a?sc.text:"#9ca3af",fontWeight:800,fontSize:11,cursor:"pointer"}}>{sc.icon} {s}</button>
              );})}
            </div>
          </div>
          <div><label style={lbl}>Equipment</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {EQ.map(eq=>{const a=form.equipment.includes(eq);return(<button key={eq} onClick={()=>tog(eq)} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid",borderColor:a?"#f97316":"#e2e8f0",background:a?"#fff7ed":"#f8fafc",color:a?"#ea580c":"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer"}}>{eq}</button>);})}
            </div>
          </div>
          <div><label style={lbl}>Notes — add what was completed</label>
            <textarea style={{...inp,minHeight:100,resize:"vertical"}} placeholder="Add work progress, notes, issues..." value={form.notes} onChange={e=>set("notes",e.target.value)} onFocus={e=>e.target.style.borderColor="#f97316"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
          </div>
          <div><label style={lbl}>Checklist ({ckDone}/{CHECKLIST.length}) {ckDone===CHECKLIST.length&&<span style={{color:"#10b981"}}>✓ Complete</span>}</label>
            <div style={{background:"#f8fafc",borderRadius:10,padding:10,display:"flex",flexDirection:"column",gap:7}}>
              {CHECKLIST.map(item=>{const done=!!form.checklist[item.id];return(
                <div key={item.id} onClick={()=>togCk(item.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"3px 0"}}>
                  <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${done?"#10b981":"#cbd5e1"}`,background:done?"#10b981":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {done&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:done?"#065f46":"#374151",fontWeight:done?700:400,textDecoration:done?"line-through":"none"}}>{item.label}</span>

            <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Previous photos ({report.photos||0}) are kept</div>
            <PhotoUploader photos={photos} onAdd={p=>setPhotos(prev=>[...prev,p])} onRemove={i=>setPhotos(prev=>prev.filter((_,idx)=>idx!==i))}/>

            <button onClick={save} disabled={saving||!form.equipment.length} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:saving||!form.equipment.length?"#e2e8f0":"linear-gradient(135deg,#f97316,#ea580c)",color:saving||!form.equipment.length?"#9ca3af":"#fff",fontWeight:900,cursor:saving||!form.equipment.length?"not-allowed":"pointer",fontSize:15,opacity:saving||!form.equipment.length?0.7:1}}>
              {saving?"⏳ Saving...":!form.equipment.length?"⛔ Select equipment":"💾 Save changes"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ KILL SWITCH PANEL ══ */
function KillSwitchPanel(){
  const [cfg,setCfg]=useState(null);
  const [saving,setSaving]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    if(!firebaseOK)return;
    const ref=db.ref("config");
    ref.on("value",snap=>{
      const v=snap.val();
      if(!v){ db.ref("config").set({active:true,blockedMsg:"Access blocked by administrator."}); }
      else { setCfg(v); }
    });
    return()=>ref.off();
  },[]);
  const toggle=async()=>{
    if(!firebaseOK||!cfg)return;
    setSaving(true); await db.ref("config/active").set(!cfg.active); setSaving(false);
  };
  if(!cfg)return null;
  return(
    <div style={{background:cfg.active?"#f0fdf4":"#fef2f2",border:`1.5px solid ${cfg.active?"#86efac":"#fca5a5"}`,borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpen(!open)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{cfg.active?"🔓":"🔒"}</span>
          <div>
            <div style={{fontWeight:800,fontSize:13,color:cfg.active?"#166534":"#991b1b"}}>Kill Switch — App {cfg.active?"ACTIVE":"BLOCKED"}</div>
            <div style={{fontSize:11,color:cfg.active?"#16a34a":"#dc2626",marginTop:1}}>Click to {cfg.active?"block":"restore"} access</div>
          </div>
        </div>
        <span style={{color:"#9ca3af"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid",borderColor:cfg.active?"#bbf7d0":"#fecaca"}}>
          <button onClick={toggle} disabled={saving} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:cfg.active?"linear-gradient(135deg,#ef4444,#dc2626)":"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontWeight:900,cursor:saving?"not-allowed":"pointer",fontSize:14}}>
            {saving?"⏳ Saving...":`${cfg.active?"🔒 BLOCK application":"🔓 UNBLOCK application"}`}
          </button>
          <div style={{fontSize:11,color:"#6b7280",textAlign:"center",marginTop:8}}>Change takes effect immediately for all users</div>
        </div>
      )}
    </div>
  );
}

/* ══ ENGINEER APP ══ */
function EngineerApp({reports,onSubmit,push}){
  const initForm={siteId:"",engineer:"",equipment:[],notes:"",gps:"",status:"In Progress",checklist:{}};
  const [view,setView]=useState("myreports");
  const [form,setForm]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||"null");return d||initForm;}catch{return initForm;}});
  const [photos,setPhotos]=useState([]);
  const [gpsLoad,setGpsLoad]=useState(false);
  const [saving,setSaving]=useState(false);
  const [progress,setProgress]=useState(null);
  const [myReport,setMyReport]=useState(null);
  const [editReport,setEditReport]=useState(null);
  const [photoViewer,setPhotoViewer]=useState(null);
  const [engName,setEngName]=useState("");

  useEffect(()=>{try{localStorage.setItem(DRAFT_KEY,JSON.stringify(form));}catch{}},[form]);
  useEffect(()=>{
    if(!myReport)return;
    const updated=reports.find(r=>r.id===myReport.id);
    if(updated){
      setMyReport(updated);
      if(Object.values(updated.photoFlags||{}).some(Boolean))push("⚠️ Manager flagged photos","Check My Reports","warn");
    }
  },[reports]);

  const myReports=engName?reports.filter(r=>(r.engineer||"").toLowerCase().includes(engName.toLowerCase())):[];
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=eq=>set("equipment",form.equipment.includes(eq)?form.equipment.filter(e=>e!==eq):[...form.equipment,eq]);
  const togCk=id=>set("checklist",{...form.checklist,[id]:!form.checklist[id]});
  const ckDone=CHECKLIST.filter(i=>form.checklist[i.id]).length;

  const getGPS=()=>{
    setGpsLoad(true);
    if(!navigator.geolocation){set("gps","No GPS");setGpsLoad(false);return;}
    navigator.geolocation.getCurrentPosition(
      p=>{set("gps",`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`);setGpsLoad(false);},
      ()=>{set("gps","GPS error");setGpsLoad(false);},
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  };

  const validationErrors=[];
  if(!form.siteId)validationErrors.push("Site ID missing");
  if(!form.engineer)validationErrors.push("Full name missing");
  if(!form.equipment.length)validationErrors.push("No equipment selected");
  const formReady=validationErrors.length===0;

  const submit=async()=>{
    if(!formReady){alert("Please fix:\n\n"+validationErrors.map(e=>"• "+e).join("\n"));return;}
    setSaving(true);
    const reportId=Date.now();
    let uploadedPhotos=photos;
    if(photos.length>0){
      setProgress({current:0,total:photos.length});
      uploadedPhotos=await processAllPhotos(photos,form.gps,(cur,tot)=>setProgress({current:cur,total:tot}),form.siteId);
      setProgress(null);
    }
    const r={...form,photos:uploadedPhotos.length,photoData:uploadedPhotos,date:today(),timestamp:reportId,id:reportId,read:false,photoFlags:{}};
    await idbSave({...r,id:reportId});
    try{
      const result=await onSubmit(r);
      if(result){
        await idbDelete(reportId);
        setMyReport(result);
        localStorage.setItem("eng_name_v5",form.engineer);
        setEngName(form.engineer);
        setView("myreports");
        try{localStorage.removeItem(DRAFT_KEY);}catch{}
      }else{
        push("Saved locally","Submit when signal returns","warn");
        setView("myreports");
      }
    }catch(e){push("Save error","Check internet connection","error");}
    setSaving(false);
  };

  if(photoViewer)return <PhotoViewer photos={photoViewer.photos} startIndex={photoViewer.index} onClose={()=>setPhotoViewer(null)}/>;
  if(view==="fixphotos"&&myReport)return <FixPhotosView report={myReport} push={push} onDone={()=>setView("myreports")} onBack={()=>setView("myreports")}/>;
  if(view==="editreport"&&editReport)return <EditReportView report={editReport} push={push} onSave={()=>setView("myreports")} onBack={()=>setView("myreports")}/>;

  const lbl={fontSize:11,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,display:"block"};

  /* MY REPORTS VIEW */
  if(view==="myreports")return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>My Reports</h2><p style={{margin:"2px 0 0",color:"#64748b",fontSize:12}}>Status and manager feedback</p></div>
          <button onClick={()=>setView("form")} style={{padding:"9px 16px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#f97316,#ea580c)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,boxShadow:"0 4px 12px rgba(249,115,22,.3)"}}>+ New Report</button>
        </div>
        {!engName&&(
          <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:12,padding:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"#ea580c",marginBottom:8}}>Enter your name to see your reports:</div>
            <div style={{display:"flex",gap:8}}>
              <input id="eng_inp" placeholder="Full name" style={{flex:1,padding:"9px 12px",borderRadius:9,border:"1.5px solid #fed7aa",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={()=>{const v=document.getElementById("eng_inp").value.trim();if(v){setEngName(v);localStorage.setItem("eng_name_v5",v);}}} style={{padding:"9px 14px",borderRadius:9,border:"none",background:"#f97316",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>Save</button>
            </div>
          </div>

        {engName&&myReports.length===0&&(
          <div style={{textAlign:"center",padding:40,color:"#9ca3af",background:"#fff",borderRadius:14,border:"1.5px solid #f1f5f9"}}>

                      <div key={i} onClick={()=>setPhotoViewer({photos:r.photoData||[],index:i})} style={{borderRadius:8,overflow:"hidden",aspectRatio:"1",border:`2px solid ${flags[i]?"#ef4444":"#d1fae5"}`,position:"relative",cursor:"zoom-in"}}>
                        <img src={p.url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        <div style={{position:"absolute",bottom:0,left:0,right:0,background:flags[i]?"rgba(239,68,68,.85)":"rgba(16,185,129,.75)",color:"#fff",fontSize:9,fontWeight:800,padding:"2px",textAlign:"center"}}>{flags[i]?"⚠️ TO FIX":"✓ OK"}</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>{setMyReport(r);setView("fixphotos");}} style={{width:"100%",marginTop:10,padding:"10px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#f97316,#ea580c)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>📸 Fix flagged photos</button>
                </div>
              )}
            </div>
          );
        })}

      </div>
    </div>
  );

  /* FORM VIEW */
  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <button onClick={()=>setView("myreports")} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>← Back</button>
            <h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Installation Report</h2>
          </div>
          {form.siteId&&<span style={{fontSize:10,color:"#10b981",fontWeight:700,background:"#d1fae5",padding:"3px 8px",borderRadius:20}}>✓ Draft</span>}
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label style={lbl}>Site ID</label>
              <input style={inp} placeholder="e.g. IE-LAOIS-042" value={form.siteId} onChange={e=>set("siteId",e.target.value.toUpperCase())} onFocus={e=>e.target.style.borderColor="#f97316"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/></div>
            <div><label style={lbl}>Full Name</label>
              <input style={inp} placeholder="Engineer name" value={form.engineer} onChange={e=>set("engineer",e.target.value)} onFocus={e=>e.target.style.borderColor="#f97316"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/></div>
          </div>
          <div><label style={lbl}>Status</label>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(SC).map(([s,sc])=>{const a=form.status===s;return(<button key={s} onClick={()=>set("status",s)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"2px solid",borderColor:a?sc.dot:"#e2e8f0",background:a?sc.bg:"#f8fafc",color:a?sc.text:"#9ca3af",fontWeight:800,fontSize:11,cursor:"pointer"}}>{sc.icon} {s}</button>);})}
            </div>
          </div>
          <div><label style={lbl}>Equipment</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {EQ.map(eq=>{const a=form.equipment.includes(eq);return(<button key={eq} onClick={()=>tog(eq)} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid",borderColor:a?"#f97316":"#e2e8f0",background:a?"#fff7ed":"#f8fafc",color:a?"#ea580c":"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer"}}>{eq}</button>);})}
            </div>
          </div>
          <div><label style={lbl}>GPS</label>
            <div style={{display:"flex",gap:8}}>
              <input style={{...inp,flex:1}} placeholder="53.019545, -7.147809" value={form.gps} onChange={e=>set("gps",e.target.value)} onFocus={e=>e.target.style.borderColor="#f97316"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
              <button onClick={getGPS} style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:18,minWidth:48}}>{gpsLoad?"⏳":"📍"}</button>
            </div>
          </div>
          <div><label style={lbl}>Notes</label>
            <textarea style={{...inp,minHeight:80,resize:"vertical"}} placeholder="Description of work carried out, issues, deviations..." value={form.notes} onChange={e=>set("notes",e.target.value)} onFocus={e=>e.target.style.borderColor="#f97316"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
          </div>
          <div><label style={lbl}>Checklist ({ckDone}/{CHECKLIST.length}) {ckDone===CHECKLIST.length&&<span style={{color:"#10b981"}}>✓ Complete</span>}</label>
            <div style={{background:"#f8fafc",borderRadius:10,padding:10,display:"flex",flexDirection:"column",gap:7}}>
              {CHECKLIST.map(item=>{const done=!!form.checklist[item.id];return(
                <div key={item.id} onClick={()=>togCk(item.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"3px 0"}}>
                  <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${done?"#10b981":"#cbd5e1"}`,background:done?"#10b981":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {done&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:done?"#065f46":"#374151",fontWeight:done?700:400,textDecoration:done?"line-through":"none"}}>{item.label}</span>
                </div>);})}
          </div></div>
          <div><label style={lbl}>Photos {photos.length>0&&<span style={{color:"#f97316"}}>({photos.length}) — GPS+time watermark</span>}</label>
            <PhotoUploader photos={photos} onAdd={p=>setPhotos(prev=>[...prev,p])} onRemove={i=>setPhotos(prev=>prev.filter((_,idx)=>idx!==i))}/>
          </div>
          <div style={{position:"sticky",bottom:0,background:"#fff",paddingTop:10,borderTop:"1.5px solid #f1f5f9"}}>
            {progress&&<div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:4}}>🖼 Processing {progress.current}/{progress.total}...</div><div style={{height:5,borderRadius:5,background:"#f1f5f9",overflow:"hidden"}}><div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#f97316,#ea580c)",width:`${Math.round(progress.current/progress.total*100)}%`}}/></div></div>}
            {validationErrors.length>0&&<div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",flexDirection:"column",gap:3}}>{validationErrors.map((e,i)=><div key={i} style={{fontSize:12,color:"#dc2626",fontWeight:600}}>⚠ {e}</div>)}</div>}
            <button onClick={submit} disabled={saving||!formReady} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:saving||!formReady?"#e2e8f0":"linear-gradient(135deg,#f97316,#ea580c)",color:saving||!formReady?"#9ca3af":"#fff",fontWeight:900,cursor:saving||!formReady?"not-allowed":"pointer",fontSize:16,boxShadow:saving||!formReady?"none":"0 4px 20px rgba(249,115,22,.4)",opacity:saving||!formReady?0.7:1}}>
              {saving?"⏳ Processing...":!formReady?"⛔ Complete required fields":"💾 Save and submit report"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ MANAGER APP ══ */
function ManagerApp({reports,onFlagPhoto,push,isAdmin}){
  const [selected,setSelected]=useState(null);
  const openReport=r=>{
    setSelected(r);
    setModal(null);
    if(!r.read&&firebaseOK&&r.fbKey){
      fbUpdate(r.fbKey,{read:true});
    }
  };
  const [modal,setModal]=useState(null);
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [photoViewer,setPhotoViewer]=useState(null);

  /* Sync selected with live reports */
  useEffect(()=>{
    if(!selected)return;
    const updated=reports.find(r=>r.fbKey===selected.fbKey);
    if(updated)setSelected(updated);
  },[reports]);

  const filtered=reports.filter(r=>{
    const ms=filter==="All"||r.status===filter;
    const mq=(r.siteId||"").toLowerCase().includes(search.toLowerCase())||(r.engineer||"").toLowerCase().includes(search.toLowerCase());
    return ms&&mq&&(!dateFrom||r.date>=dateFrom)&&(!dateTo||r.date<=dateTo);
  });

  const kpi=useMemo(()=>{
    const t7=new Date(); t7.setDate(t7.getDate()-7); const t7s=t7.toISOString().split("T")[0];
    return{
      total:reports.length,
      done:reports.filter(r=>r.status==="Completed").length,
      wip:reports.filter(r=>r.status==="In Progress").length,
      issues:reports.filter(r=>r.status==="Problem").length,
      recent7:reports.filter(r=>r.date>=t7s).length,
      flagged:reports.filter(r=>Object.values(r.photoFlags||{}).some(Boolean)).length,
      checkPct:reports.length?Math.round(reports.reduce((a,r)=>a+CHECKLIST.filter(i=>(r.checklist||{})[i.id]).length/CHECKLIST.length,0)/reports.length*100):0,
    };
  },[reports]);

  if(photoViewer)return <PhotoViewer photos={photoViewer.photos} startIndex={photoViewer.index} onClose={()=>setPhotoViewer(null)}/>;

  const Modal=({children})=>(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:600,maxHeight:"85vh",overflowY:"auto",animation:"fadeUp .3s ease",position:"relative",zIndex:9001}}>{children}</div>
    </div>
  );

  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      {modal==="photos"&&selected&&(
        <Modal>
          <div style={{fontWeight:700,fontSize:14,color:"#374151",marginBottom:12}}>Review photos — engineer sees instantly</div>
          {(selected.photoData||[]).length===0&&<div style={{color:"#9ca3af",fontSize:13}}>No photos</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {(selected.photoData||[]).map((p,i)=>{const flags=selected.photoFlags||{};return(
              <div key={i} style={{borderRadius:10,overflow:"hidden",border:`3px solid ${flags[i]?"#ef4444":"#d1fae5"}`,position:"relative"}}>
                <img src={p.url} alt="" onClick={()=>setPhotoViewer({photos:selected.photoData||[],index:i})} loading="lazy" style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block",cursor:"zoom-in"}}/>
                <div onClick={()=>onFlagPhoto(selected.fbKey,i,!flags[i])} style={{position:"absolute",bottom:0,left:0,right:0,padding:"7px 4px",textAlign:"center",fontSize:11,fontWeight:800,background:flags[i]?"rgba(239,68,68,.88)":"rgba(16,185,129,.82)",color:"#fff",cursor:"pointer"}}>
                  {flags[i]?"⚠️ TO FIX — tap to undo":"✓ OK — tap to flag"}
                </div>
              </div>);})}
          </div>
          <button onClick={()=>setModal(null)} style={{width:"100%",marginTop:14,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:14}}>Close</button>
        </Modal>
      )}
      {modal==="pdf"&&selected&&(
        <Modal><OperatorReport report={selected} onClose={()=>setModal(null)}/></Modal>
      )}

      <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        {isAdmin&&<KillSwitchPanel/>}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div><h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Manager Dashboard</h2><p style={{margin:"2px 0 0",color:"#64748b",fontSize:12}}>Live updates · {reports.length} reports</p></div>
          <button onClick={()=>exportCSV(filtered)} style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#374151",fontWeight:700,cursor:"pointer",fontSize:12}}>📊 CSV ({filtered.length})</button>
        </div>

        {/* KPI */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {[{l:"Total",v:kpi.total,c:"#0f172a",s:"all reports"},{l:"Completed",v:kpi.done,c:"#10b981",s:`${kpi.total?Math.round(kpi.done/kpi.total*100):0}% done`},{l:"In Progress",v:kpi.wip,c:"#f59e0b",s:"active works"},{l:"Problems",v:kpi.issues,c:"#ef4444",s:"needs attention"},{l:"Last 7 days",v:kpi.recent7,c:"#6366f1",s:"new reports"},{l:"Photos to fix",v:kpi.flagged,c:"#f97316",s:"flagged reports"},{l:"Checklist avg",v:`${kpi.checkPct}%`,c:"#0891b2",s:"completion"}].map(s=>(
            <div key={s.l} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #f1f5f9"}}>
              <div style={{fontSize:26,fontWeight:900,color:s.c}}>{s.v}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginTop:1}}>{s.l}</div>
              <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>{s.s}</div>
            </div>
          ))}
        </div>

        {/* Alerts */}
        {reports.filter(r=>r.status==="Problem"&&!r.read).map(r=>(
          <div key={r.id} onClick={()=>openReport(r)} style={{background:"#fee2e2",border:"1.5px solid #fca5a5",borderRadius:12,padding:"12px 16px",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
            <span style={{fontSize:22}}>🚨</span>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14,color:"#991b1b"}}>{r.siteId} — Problem</div><div style={{fontSize:12,color:"#b91c1c",marginTop:2}}>{r.engineer} · {(r.notes||"").substring(0,60)}</div></div>
            <span style={{color:"#991b1b",fontSize:18}}>→</span>
          </div>
        ))}

        {/* Filters */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

          {["All","Completed","In Progress","Problem"].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{padding:"7px 12px",borderRadius:10,border:"1.5px solid",borderColor:filter===s?"#f97316":"#e2e8f0",background:filter===s?"#fff7ed":"#fff",color:filter===s?"#ea580c":"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer"}}>{s}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#6b7280"}}>📅 From:</span>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          <span style={{fontSize:12,fontWeight:700,color:"#6b7280"}}>To:</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom("");setDateTo("");}} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #fca5a5",background:"#fee2e2",color:"#991b1b",fontWeight:700,fontSize:12,cursor:"pointer"}}>✕</button>}
        </div>

        {/* List / Detail */}
        {selected?(
          <div style={{background:"#fff",borderRadius:16,padding:18,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div style={{fontWeight:900,fontSize:20,color:"#0f172a"}}>{selected.siteId}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{selected.engineer} · {fmtDate(selected.date)} {fmtTime(selected.timestamp)}</div></div>
              <span style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:800,background:(SC[selected.status]||SC["In Progress"]).bg,color:(SC[selected.status]||SC["In Progress"]).text}}>{selected.status}</span>
            </div>
            {[["📍 GPS",selected.gps||"—"],["🔧 Equipment",(selected.equipment||[]).join(", ")],["📝 Notes",selected.notes||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#f8fafc",borderRadius:10,padding:"11px 14px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,color:"#374151",whiteSpace:"pre-wrap"}}>{v}</div>
              </div>
            ))}
            {selected.checklist&&(
              <div style={{background:"#f8fafc",borderRadius:10,padding:"11px 14px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>✓ Checklist ({CHECKLIST.filter(i=>selected.checklist[i.id]).length}/{CHECKLIST.length})</div>
                {CHECKLIST.map(item=>{const done=!!selected.checklist[item.id];return(
                  <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0"}}>
                    <span style={{fontSize:13,color:done?"#10b981":"#ef4444",fontWeight:700}}>{done?"✓":"✗"}</span>
                    <span style={{fontSize:12,color:done?"#374151":"#9ca3af",textDecoration:!done?"line-through":"none"}}>{item.label}</span>

              <button onClick={()=>setModal("pdf")} style={{padding:"11px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0f172a,#1e293b)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,gridColumn:(selected.photoData||[]).length===0?"1/3":"auto"}}>🖨 PDF Report</button>

            {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>No reports</div>}
            {filtered.map(r=>{const sc=SC[r.status]||SC["In Progress"];const flags=r.photoFlags||{};const hasFlagged=Object.values(flags).some(Boolean);const ckDone=CHECKLIST.filter(i=>(r.checklist||{})[i.id]).length;return(

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {(r.equipment||[]).slice(0,3).map(eq=><span key={eq} style={{padding:"2px 8px",borderRadius:20,background:"#f1f5f9",color:"#475569",fontSize:10,fontWeight:600}}>{eq}</span>)}
                    {(r.equipment||[]).length>3&&<span style={{fontSize:10,color:"#9ca3af"}}>+{(r.equipment||[]).length-3}</span>}
                  </div>
                  <div style={{display:"flex",gap:8,fontSize:11,color:"#9ca3af"}}>
                    <span>📷 {r.photos||0}</span>
                    <span>✓ {ckDone}/{CHECKLIST.length}</span>
                  </div>
                </div>
              </div>);})}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ PDF REPORT ══ */

    @media print{body{padding:20px}}</style></head><body>

      <svg viewBox="0 0 320 80" width="180" height="45" xmlns="http://www.w3.org/2000/svg">
        <circle cx="110" cy="14" r="10" fill="#e84040"/>
        <circle cx="138" cy="14" r="10" fill="#f0832a"/>
        <circle cx="166" cy="14" r="10" fill="#f0c020"/>
        <circle cx="194" cy="14" r="10" fill="#7ab929"/>
        <circle cx="222" cy="14" r="10" fill="#29a8e0"/>
        <circle cx="250" cy="14" r="10" fill="#9b3fa0"/>
        <text x="160" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="26" fill="#5a6472" letter-spacing="3">SPECTRUM</text>
        <text x="160" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="11" fill="#7a8490" letter-spacing="2">CONNECTING COMMUNITIES</text>
      </svg>

/* ══ KILL SCREEN ══ */
function KillScreen({reason}){
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0f172a 60%,#1e293b)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{animation:"fadeUp .5s ease",maxWidth:360}}>
        <div style={{width:72,height:72,borderRadius:20,background:"rgba(239,68,68,.15)",border:"2px solid rgba(239,68,68,.3)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:24}}>🔒</div>
        <div style={{color:"#fff",fontWeight:900,fontSize:24,marginBottom:8}}>Application unavailable</div>
        <div style={{color:"#64748b",fontSize:14,lineHeight:1.6,marginBottom:24}}>{reason||"Access has been temporarily blocked. Please contact your administrator."}</div>
        <div style={{padding:"10px 20px",borderRadius:12,background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",color:"#f87171",fontSize:12,fontWeight:700}}>SPECTRUM TELECOM · TOWER REPORT PRO</div>
      </div>
    </div>
  );
}

/* ══ ROOT APP ══ */
function App(){
  const getSavedRole=()=>{try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");if(s&&Date.now()-s.ts<SESSION_TTL)return s.role;localStorage.removeItem(SESSION_KEY);}catch{}return null;};
  const [role,setRole]=useState(getSavedRole);
  const [reports,setReports]=useState([]);
  const [connected,setConnected]=useState(false);
  const [notifs,setNotifs]=useState([]);
  const [appStatus,setAppStatus]=useState(null);
  const [authReady,setAuthReady]=useState(!firebaseOK);
  const [manView,setManView]=useState("dashboard");
  const nid=useRef(100);
  const prevIds=useRef(new Set(JSON.parse(localStorage.getItem("tr_seen_reports")||"[]")));
  const saveSeen=ids=>{ try{localStorage.setItem("tr_seen_reports",JSON.stringify([...ids]));}catch{}};

  const push=useCallback((title,msg,type="ok")=>{
    const id=++nid.current; setNotifs(p=>[...p,{id,title,msg,type}]);
    setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),5000);
  },[]);

  /* Auth */
  useEffect(()=>{
    if(!firebaseOK){setAuthReady(true);return;}
    waitForAuth().then(user=>{
      console.log("Auth ready, user:",user?.uid||"none");
      setAuthReady(true);
    });
  },[]);

  /* Kill switch */
  useEffect(()=>{
    if(!authReady)return;
    if(!firebaseOK){setAppStatus(true);return;}
    const ref=db.ref("config");
    const check=cfg=>{
      if(!cfg){setAppStatus(true);return;}
      if(cfg.expiresAt&&Date.now()>cfg.expiresAt){setAppStatus({blocked:true,reason:cfg.expiredMsg||"Licence expired."});return;}
      setAppStatus(cfg.active===false?{blocked:true,reason:cfg.blockedMsg||"Access blocked."}:true);
    };
    ref.once("value",snap=>check(snap.val()));
    ref.on("value",snap=>check(snap.val()));
    return()=>ref.off();
  },[authReady]);

  /* Reports */
  useEffect(()=>{
    if(!role||!authReady)return;
    if(!firebaseOK){push("Offline mode","Firebase not configured","warn");return;}
    const u1=fbSub(list=>{
      setConnected(true);
      if(role==="manager"||role==="admin"){
        const isFirstLoad=prevIds.current.size===0;
        list.forEach(r=>{
          if(!prevIds.current.has(r.id)&&!isFirstLoad){
            if(r.status==="Problem")push("🚨 Problem!",`${r.siteId} – ${r.engineer}`,"error");
            else push("📋 New report",`${r.siteId} – ${r.engineer}`,"ok");
          }
          prevIds.current.add(r.id);
        });
        saveSeen(prevIds.current);
      }
      setReports(list);
    });
    const cref=db.ref(".info/connected"); cref.on("value",s=>setConnected(!!s.val()));
    return()=>{u1();cref.off();};
  },[role,authReady]);

  /* Session expiry */
  useEffect(()=>{
    if(!role)return;
    const remaining=()=>{try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");if(s)return Math.max(0,SESSION_TTL-(Date.now()-s.ts));}catch{}return SESSION_TTL;};
    const t=setTimeout(()=>{setRole(null);localStorage.removeItem(SESSION_KEY);setReports([]);prevIds.current=new Set();},remaining());
    return()=>clearTimeout(t);
  },[role]);

  const handleLogin=r=>{localStorage.setItem(SESSION_KEY,JSON.stringify({role:r,ts:Date.now()}));setRole(r);};
  const handleLogout=()=>{setRole(null);setReports([]);prevIds.current=new Set();localStorage.removeItem(SESSION_KEY);localStorage.removeItem('eng_name_v5');/* keep tr_seen_reports so notifications don't repeat */};
  const handleSubmit=async r=>{
    try{
      if(firebaseOK){const ref=await fbPush(r);if(!ref||!ref.key)throw new Error("No key");return{...r,fbKey:ref.key};}
      else{setReports(p=>[r,...p]);return r;}
    }catch(e){console.error("Submit error",e);push("Save error","Check internet connection and try again","error");return null;}
  };
  const flagPhoto=(fbKey,idx,val)=>{
    if(firebaseOK&&fbKey)fbUpdate(fbKey,{[`photoFlags/${idx}`]:val});
    setReports(p=>p.map(r=>r.fbKey===fbKey?{...r,photoFlags:{...r.photoFlags,[idx]:val}}:r));
  };

  const unread=reports.filter(r=>!r.read).length;

  /* Loading */
  if(appStatus===null)return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#f97316,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>📡</div>
      <div style={{color:"#475569",fontSize:13,fontWeight:700}}>Connecting to server...</div>
    </div>
  );

  if(appStatus!==true)return <KillScreen reason={appStatus.reason}/>;
  if(!role)return <LoginScreen onLogin={handleLogin}/>;

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <Toast notifs={notifs} dismiss={id=>setNotifs(p=>p.filter(n=>n.id!==id))}/>
      <Header role={role} connected={connected} unread={unread} onLogout={handleLogout} onNav={setManView} view={manView}/>
      {role==="engineer"
        ?<EngineerApp reports={reports} onSubmit={handleSubmit} push={push}/>
        :<ManagerApp reports={reports} onFlagPhoto={flagPhoto} push={push} isAdmin={role==="admin"}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
