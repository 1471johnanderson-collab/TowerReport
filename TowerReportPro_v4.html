async function hashPin(pin){
  const salted=PIN_SALT+pin+PIN_SALT;
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(salted));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* Anonimowe logowanie do Firebase — daje token dla Rules */
function firebaseSignIn(){
  if(!auth)return Promise.resolve(null);
  if(auth.currentUser)return Promise.resolve(auth.currentUser);
  return auth.signInAnonymously()
    .then(r=>r.user)
    .catch(e=>{console.warn("Auth error",e);return null;});
}

/* Czeka na potwierdzenie auth state od Firebase */
function waitForAuth(){
  return new Promise(resolve=>{
    if(!auth){resolve(null);return;}
    const unsub=auth.onAuthStateChanged(user=>{
      unsub();
      if(user){resolve(user);return;}
      auth.signInAnonymously()
        .then(r=>resolve(r.user))
        .catch(()=>resolve(null));
    });
  });
}

const IDB_NAME="TowerReportDB_v4",IDB_STORE="drafts";
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE,{keyPath:"id"});r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej("IDB error");});}
async function idbSave(data){
  try{
    const db=await openIDB();
    const tx=db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(data);
    await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j;});
    db.close();

  }catch(e){

}

/* ── KOMPRESJA + WATERMARK ── */
async function processPhoto(dataUrl,gps){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=500;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,w,h);
      const now=new Date();
      const dateStr=now.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
      const timeStr=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const barH=Math.max(32,Math.round(h*0.045));
      ctx.fillStyle="rgba(0,0,0,0.72)";ctx.fillRect(0,h-barH,w,barH);
      const fs=Math.max(11,Math.round(barH*0.48));
      ctx.font=`bold ${fs}px Barlow,Arial,sans-serif`;ctx.fillStyle="#fff";ctx.textBaseline="middle";
      const mid=h-barH/2;
      ctx.fillText(`📅 ${dateStr}  🕐 ${timeStr}`,10,mid);
      if(gps){ctx.textAlign="right";ctx.fillText(`📍 ${gps}`,w-10,mid);ctx.textAlign="left";}
      resolve(canvas.toDataURL("image/jpeg",0.55));
    };
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}
async function processAllPhotos(photos,gps,onProgress,siteId){
  const results=[];
  const dateStr=new Date().toISOString().split("T")[0].replace(/-/g,"");
  const site=(siteId||"SITE").replace(/[^a-zA-Z0-9]/g,"-").toUpperCase();
  for(let i=0;i<photos.length;i++){
    const url=await processPhoto(photos[i].url,gps);
    onProgress&&onProgress(i+1,photos.length);
    const name=`${site}_${dateStr}_${String(i+1).padStart(2,"0")}.jpg`;
    results.push({name,url});
  }
  return results;
}

/* ══ PHOTO FULLSCREEN VIEWER ══ */
function PhotoViewer({photos, startIndex, onClose}){
  const [idx, setIdx] = useState(startIndex||0);
  const total = photos.length;

  useEffect(()=>{
    const handler = e => {
      if(e.key==="ArrowRight") setIdx(i=>Math.min(i+1,total-1));
      if(e.key==="ArrowLeft") setIdx(i=>Math.max(i-1,0));
      if(e.key==="Escape") onClose();
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.95)",zIndex:99999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:700,display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}}>
          <span style={{color:"#94a3b8",fontSize:13,fontWeight:700}}>{idx+1} / {total}</span>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕ Close</button>
        </div>
        <img src={photos[idx]?.url} alt="" style={{width:"100%",maxHeight:"70vh",objectFit:"contain",borderRadius:10}}/>
        {photos[idx]?.name&&<div style={{color:"#64748b",fontSize:11}}>{photos[idx].name}</div>}
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0} style={{padding:"10px 20px",borderRadius:10,border:"none",background:idx===0?"#1e293b":"#334155",color:idx===0?"#475569":"#fff",fontWeight:800,cursor:idx===0?"not-allowed":"pointer",fontSize:18}}>←</button>
          <div style={{display:"flex",gap:6}}>
            {photos.map((_,i)=><div key={i} onClick={()=>setIdx(i)} style={{width:8,height:8,borderRadius:"50%",background:i===idx?"#f97316":"#334155",cursor:"pointer"}}/>)}
          </div>
          <button onClick={()=>setIdx(i=>Math.min(i+1,total-1))} disabled={idx===total-1} style={{padding:"10px 20px",borderRadius:10,border:"none",background:idx===total-1?"#1e293b":"#334155",color:idx===total-1?"#475569":"#fff",fontWeight:800,cursor:idx===total-1?"not-allowed":"pointer",fontSize:18}}>→</button>
        </div>
      </div>
    </div>
  );
}

/* ══ FIX PHOTOS ══ */
function FixPhotosView({report,onDone,onBack,push}){
  const [replacements,setReplacements]=useState({});const [fixing,setFixing]=useState(false);const [fixingIdx,setFixingIdx]=useState(null);
  const camRef=useRef();const galRef=useRef();
  const flags=report.photoFlags||{};const allPhotos=report.photoData||[];
  const onFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setReplacements(prev=>({...prev,[fixingIdx]:{name:f.name,url:ev.target.result}}));r.readAsDataURL(f);e.target.value="";};
  const sendFixed=async()=>{
    if(!Object.keys(replacements).length){alert("You haven't replaced any photo.");return;}
    setFixing(true);
    const processed=[];
    for(let i=0;i<allPhotos.length;i++){
      if(replacements[i]){const url=await processPhoto(replacements[i].url,report.gps);processed.push({name:replacements[i].name,url});}
      else processed.push(allPhotos[i]);
    }
    const newFlags={...flags};Object.keys(replacements).forEach(i=>{delete newFlags[i];});
    if(firebaseOK&&report.fbKey)await fbUpdateReport(report.fbKey,{photoDate:processed,photoFlags:newFlags,photos:processed.length});
    push("✅ Photos fixed","Manager sees changes instantly","ok");
    setFixing(false);onDone();
  };
  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:16}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>← Back</button>
        <h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Fix Photos — {report.siteId}</h2>
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{position:"fixed",opacity:0,pointerEvents:"none",width:1,height:1,top:0,left:0}} onChange={onFile}/>
        <input ref={galRef} type="file" accept="image/*" style={{position:"fixed",opacity:0,pointerEvents:"none",width:1,height:1,top:0,left:0}} onChange={onFile}/>
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:13,color:"#374151"}}><span style={{fontWeight:700}}>Red = needs fixing.</span> Use 📸/🖼️ buttons below photo:</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {allPhotos.map((p,i)=>{const isFlagged=!!flags[i];const replaced=replacements[i];return(
              <div key={i} style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{borderRadius:10,overflow:"hidden",aspectRatio:"1",border:`3px solid ${replaced?"#10b981":isFlagged?"#ef4444":"#d1fae5"}`,position:"relative"}}>
                  <img src={replaced?replaced.url:p.url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"3px",textAlign:"center",fontSize:9,fontWeight:800,background:replaced?"rgba(16,185,129,.9)":isFlagged?"rgba(239,68,68,.85)":"rgba(16,185,129,.75)",color:"#fff"}}>{replaced?"✓ OK":isFlagged?"⚠️ TO FIX":"✓ OK"}</div>
                </div>
                {isFlagged&&(
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setFixingIdx(i);setTimeout(()=>camRef.current.click(),50);}} style={{flex:1,padding:"5px",borderRadius:7,border:"1.5px solid #fed7aa",background:"#fff7ed",color:"#ea580c",fontWeight:800,cursor:"pointer",fontSize:12}}>📸</button>
                    <button onClick={()=>{setFixingIdx(i);setTimeout(()=>galRef.current.click(),50);}} style={{flex:1,padding:"5px",borderRadius:7,border:"1.5px solid #c7d2fe",background:"#eef2ff",color:"#4f46e5",fontWeight:800,cursor:"pointer",fontSize:12}}>🖼️</button>
                  </div>
                )}
              </div>);})}
          </div>
          {Object.keys(replacements).length>0&&<div style={{background:"#d1fae5",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#065f46"}}>✓ Replaced {Object.keys(replacements).length} of {Object.values(flags).filter(Boolean).length} photos</div>}
          <button onClick={sendFixed} disabled={fixing} style={{padding:"14px",borderRadius:12,border:"none",background:fixing?"#e2e8f0":"linear-gradient(135deg,#f97316,#ea580c)",color:fixing?"#9ca3af":"#fff",fontWeight:900,cursor:fixing?"not-allowed":"pointer",fontSize:15}}>{fixing?"⏳ Uploading...":"💾 Submit fixed photos"}</button>
        </div>
      </div>
    </div>
  );
}

            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ ENGINEER APP ══ */
function EngineerApp({reports,tasks,onSubmit,push}){
  const [view,setView]=useState("myreports");
  const initForm={siteId:"",engineer:"",equipment:[],notes:"",gps:"",status:"In Progress",checklist:{}};
  const [form,setForm]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||"null");return d||initForm;}catch{return initForm;}});
  const [photos,setPhotos]=useState([]);const [gpsLoad,setGpsLoad]=useState(false);const [saving,setSaving]=useState(false);const [uploadProgress,setUploadProgress]=useState(null);
  const [myReport,setMyReport]=useState(null);
  const [editReport,setEditReport]=useState(null);
  const [photoViewer,setPhotoViewer]=useState(null);
  const [engName,setEngName]=useState(()=>localStorage.getItem("eng_name_v4")||"");

  useEffect(()=>{try{localStorage.setItem(DRAFT_KEY,JSON.stringify(form));}catch{}},[form]);

  useEffect(()=>{
    if(!myReport)return;
    const updated=reports.find(r=>r.id===myReport.id);
    if(updated){
      setMyReport(updated);
      if(Object.values(updated.photoFlags||{}).some(Boolean))push("⚠️ Manager flagged photos","Check My Reports","warn");
    }
  },[reports]);

  const myReports=engName?reports.filter(r=>(r.engineer||"").toLowerCase().includes(engName.toLowerCase())):[];
  const myTasks=engName?tasks.filter(t=>(t.assignedTo||"").toLowerCase().includes(engName.toLowerCase())&&t.status!=="Completed"):[];

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=eq=>set("equipment",form.equipment.includes(eq)?form.equipment.filter(e=>e!==eq):[...form.equipment,eq]);
  const togCheck=id=>set("checklist",{...form.checklist,[id]:!form.checklist[id]});

  const getGPS=()=>{
    setGpsLoad(true);
    if(!navigator.geolocation){set("gps","Brak GPS");setGpsLoad(false);return;}
    navigator.geolocation.getCurrentPosition(
      p=>{set("gps",`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`);setGpsLoad(false);},
      ()=>{set("gps","Error lokaliofacji");setGpsLoad(false);},
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}

  const checklistDone=CHECKLIST_ITEMS.filter(i=>form.checklist[i.id]).length;

  if(!form.engineer)validationErrors.push("Full name missing");
  if(!form.equipment.length)validationErrors.push("No equipment selected");

        try{localStorage.removeItem(DRAFT_KEY);}catch{}

  const lbl={fontSize:11,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,display:"block"};

    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      <div style={{maxWidth:600,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>My Reports</h2><p style={{margin:"2px 0 0",color:"#64748b",fontSize:12}}>Status and manager feedback</p></div>
          <button onClick={()=>setView("form")} style={{padding:"9px 16px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#f97316,#ea580c)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,boxShadow:"0 4px 12px rgba(249,115,22,.3)"}}>+ New Report</button>
        </div>

        {!engName&&(

            <div style={{display:"flex",gap:8}}>
              <input id="eng_inp" placeholder="Full Name" style={{flex:1,padding:"9px 12px",borderRadius:9,border:"1.5px solid #fed7aa",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={()=>{const v=document.getElementById("eng_inp").value.trim();if(v){setEngName(v);localStorage.setItem("eng_name_v4",v);}}} style={{padding:"9px 14px",borderRadius:9,border:"none",background:"#f97316",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>Save</button>

/* ══ MAPA LEAFLET ══ */
function MapView({reports}){
  const mapRef=useRef();const mapInstance=useRef(null);
  const hasGPS=reports.filter(r=>r.gps&&r.gps.includes(","));

  useEffect(()=>{
    if(mapInstance.current)return;
    if(!mapRef.current)return;
    const map=L.map(mapRef.current).setView([53.0,-8.0],7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
    mapInstance.current=map;
    return()=>{if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}};
  },[]);

  useEffect(()=>{
    const map=mapInstance.current;if(!map)return;
    map.eachLayer(l=>{if(l instanceof L.Marker)map.removeLayer(l);});
    hasGPS.forEach(r=>{
      const parts=r.gps.split(",");const lat=parseFloat(parts[0]);const lng=parseFloat(parts[1]);
      if(isNaN(lat)||isNaN(lng))return;
      const sc=SC[r.status]||SC["In Progress"];
      const icon=L.divIcon({className:"",html:`<div style="width:28px;height:28px;border-radius:50%;background:${sc.dot};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff">${sc.icon}</div>`,iconSiofe:[28,28],iconAnchor:[14,14]});
      L.marker([lat,lng],{icon}).addTo(map).bindPopup(`<b>${r.siteId}</b><br/>${r.engineer}<br/>${r.status}<br/>${fmtDate(r.date)}`);
    });
    if(hasGPS.length>0){const bounds=L.latLngBounds(hasGPS.map(r=>{const p=r.gps.split(",");return[parseFloat(p[0]),parseFloat(p[1])];}).filter(([a,b])=>!isNaN(a)&&!isNaN(b)));if(bounds.isValid())map.fitBounds(bounds,{padding:[20,20]});}
  },[reports]);

  return(
    <div style={{padding:"18px 14px",maxWidth:900,margin:"0 auto"}}>
      <h2 style={{fontWeight:900,fontSize:20,color:"#0f172a",marginBottom:4}}>Map lokaliofacji</h2>
      <p style={{color:"#64748b",fontSize:13,marginBottom:14}}>{hasGPS.length} sites with GPS</p>
      <div style={{height:420,borderRadius:14,overflow:"hidden",border:"1.5px solid #e2e8f0",marginBottom:14}} ref={mapRef}/>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {Object.entries(SC).map(([s,sc])=>(
          <div key={s} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,background:sc.bg}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:sc.dot}}/>
            <span style={{fontSize:12,fontWeight:700,color:sc.text}}>{s}: {reports.filter(r=>r.status===s).length}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══ KILL SWITCH PANEL (widocofny tylko dla managera) ══ */
function KillSwitchPanel(){
  const [cfg,setCfg]=useState(null);
  const [saving,setSaving]=useState(false);
  const [open,setOpen]=useState(false);

  useEffect(()=>{
    if(!firebaseOK)return;
    const ref=db.ref("config");
    ref.on("value",snap=>{
      const v=snap.val();
      if(!v){
        /* Brak config — inicjaliofuj automatycofnie */
        db.ref("config").set({active:true,blockedMsg:"Access blocked by administrator.",expiredMsg:"Licence expired."});
      } else {
        setCfg(v);
      }
    });
    return()=>ref.off();
  },[authReady]);

  const toggle=async()=>{
    if(!firebaseOK||!cfg)return;
    setSaving(true);
    await db.ref("config/active").set(!cfg.active);
    setSaving(false);
  };

  if(!cfg)return null;

  return(
    <div style={{background:cfg.active?"#f0fdf4":"#fef2f2",border:`1.5px solid ${cfg.active?"#86efac":"#fca5a5"}`,borderRadius:14,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpen(!open)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>{cfg.active?"🔓":"🔒"}</span>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:cfg.active?"#166534":"#991b1b"}}>Kill Switch — application {cfg.active?"ACTIVE":"BLOCKED"}</div>
            <div style={{fontSize:11,color:cfg.active?"#16a34a":"#dc2626",marginTop:1}}>{cfg.active?"Click to block access":"Click to restore access"}</div>
          </div>
        </div>
        <span style={{color:"#9ca3af",fontSize:16}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:10,borderTop:"1px solid",borderColor:cfg.active?"#bbf7d0":"#fecaca",paddingTop:14}}>
          <button onClick={toggle} disabled={saving} style={{padding:"12px",borderRadius:11,border:"none",background:cfg.active?"linear-gradient(135deg,#ef4444,#dc2626)":"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontWeight:900,cursor:saving?"not-allowed":"pointer",fontSize:14,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>
            {saving?"⏳ Saving...":`${cfg.active?"🔒 BLOCK application":"🔓 UNBLOCK application"}`}
          </button>
          <div style={{fontSize:11,color:"#6b7280",textAlign:"center"}}>Change takes effect immediately for all users</div>
        </div>
      )}
    </div>
  );
}

/* ══ MANAGER APP ══ */
function ManagerApp({reports,tasks,onFlagPhoto,push,isAdmin,view,setView}){
  const [selected,setSelected]=useState(null);const [modal,setModal]=useState(null);
  const [managerPhotoViewer,setManagerPhotoViewer]=useState(null);
  const [filter,setFilter]=useState("All");const [search,setSearch]=useState("");
  const [dateFrom,setDateFrom]=useState("");const [dateTo,setDateTo]=useState("");

  /* Sync selected with live reports */
  useEffect(()=>{
    if(!selected)return;
    const updated=reports.find(r=>r.fbKey===selected.fbKey);
    if(updated)setSelected(updated);
  },[reports]);

  const filtered=reports.filter(r=>{
    const ms=filter==="All"||r.status===filter;
    const mq=(r.siteId||"").toLowerCase().includes(search.toLowerCase())||(r.engineer||"").toLowerCase().includes(search.toLowerCase());
    return ms&&mq&&(!dateFrom||r.date>=dateFrom)&&(!dateTo||r.date<=dateTo);
  });

  /* KPI */
  const kpi=useMemo(()=>{
    const today7=new Date();today7.setDate(today7.getDate()-7);
    const t7str=today7.toISOString().split("T")[0];
    const recent=reports.filter(r=>r.date>=t7str);
    const flagged=reports.filter(r=>Object.values(r.photoFlags||{}).some(Boolean));
    const checklistPct=reports.length?Math.round(reports.reduce((acc,r)=>{const done=CHECKLIST_ITEMS.filter(i=>(r.checklist||{})[i.id]).length;return acc+done/CHECKLIST_ITEMS.length;},0)/reports.length*100):0;
    return{total:reports.length,done:reports.filter(r=>r.status==="Completed").length,wip:reports.filter(r=>r.status==="In Progress").length,issues:reports.filter(r=>r.status==="Problem").length,recent7:recent.length,flagged:flagged.length,checklistPct,tasksPending:tasks.filter(t=>t.status!=="Completed").length};
  },[reports,tasks]);

  if(managerPhotoViewer)return <PhotoViewer photos={managerPhotoViewer.photos} startIndex={managerPhotoViewer.index} onClose={()=>setManagerPhotoViewer(null)}/>;
  if(view==="map")return <MapView reports={reports}/>;
  if(view==="tasks")return <TasksView tasks={tasks} reports={reports} push={push}/>;

  const Modal=({children})=>(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:600,maxHeight:"85vh",overflowY:"auto",animation:"fadeUp .3s ease"}}>{children}</div>
    </div>
  );

  return(
    <div style={{background:"#f1f5f9",minHeight:"calc(100vh - 56px)"}}>
      {modal==="photos"&&selected&&(
        <Modal>
          <div style={{fontWeight:700,fontSize:14,color:"#374151",marginBottom:12}}>Review photos — engineer sees instantly</div>
          {(selected.photoData||[]).length===0&&<div style={{color:"#9ca3af",fontSize:13}}>Brak photos</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {(selected.photoData||[]).map((p,i)=>{const flags=selected.photoFlags||{};return(
              <div key={i} style={{borderRadius:10,overflow:"hidden",border:`3px solid ${flags[i]?"#ef4444":"#d1fae5"}`,position:"relative"}}>
                <img src={p.url} alt="" onClick={()=>setManagerPhotoViewer({photos:selected.photoData||[],index:i})} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block",cursor:"zoom-in"}}/>
                <div onClick={()=>onFlagPhoto(selected.fbKey,i,!flags[i])} style={{position:"absolute",bottom:0,left:0,right:0,padding:"7px 4px",textAlign:"center",fontSize:11,fontWeight:800,background:flags[i]?"rgba(239,68,68,.88)":"rgba(16,185,129,.82)",color:"#fff",cursor:"pointer"}}>
                  {flags[i]?"⚠️ TO FIX — tap to undo":"✓ OK — tap to flag"}
                </div>
              </div>
            );})}
          </div>
          <button onClick={()=>setModal(null)} style={{width:"100%",marginTop:14,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:14}}>Close</button>
        </Modal>
      )}
      {modal==="pdf"&&selected&&(
        <Modal>
          <OperatorReport report={selected} onClose={()=>setModal(null)}/>
        </Modal>
      )}

      <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div><h2 style={{margin:0,fontWeight:900,fontSize:20,color:"#0f172a"}}>Manager Dashboard</h2><p style={{margin:"2px 0 0",color:"#64748b",fontSize:12}}>Live updates · {reports.length} reports</p></div>
          <button onClick={()=>exportCSV(filtered)} style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#374151",fontWeight:700,cursor:"pointer",fontSize:12}}>📊 CSV ({filtered.length})</button>
        </div>

        {/* KILL SWITCH PANEL — tylko dla admina */}
        {isAdmin&&<KillSwitchPanel/>}

        {/* KPI DASHBOARD */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {[
            {l:"Total",v:kpi.total,c:"#0f172a",sub:"total reports"},
            {l:"Completed",v:kpi.done,c:"#10b981",sub:`${kpi.total?Math.round(kpi.done/kpi.total*100):0}% completionfenia`},
            {l:"In Progress",v:kpi.wip,c:"#f59e0b",sub:"active works"},
            {l:"Problems",v:kpi.issues,c:"#ef4444",sub:"requires attention"},
            {l:"Last 7 days",v:kpi.recent7,c:"#6366f1",sub:"new reports"},
            {l:"Photos to fix",v:kpi.flagged,c:"#f97316",sub:"reports with flags"},
            {l:"Checklist",v:`${kpi.checklistPct}%`,c:"#0891b2",sub:"average completion"},
            {l:"Open tasks",v:kpi.tasksPending,c:"#7c3aed",sub:"to complete"},
          ].map(s=>(
            <div key={s.l} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #f1f5f9"}}>
              <div style={{fontSize:26,fontWeight:900,color:s.c}}>{s.v}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginTop:1}}>{s.l}</div>
              <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>{s.sub}</div>
            </div>
          ))}
        </div>

        {/* Alerty */}
        {reports.filter(r=>r.status==="Problem"&&!r.read).map(r=>(
          <div key={r.id} onClick={()=>setSelected(r)} style={{background:"#fee2e2",border:"1.5px solid #fca5a5",borderRadius:12,padding:"12px 16px",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
            <span style={{fontSize:22}}>🚨</span>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:14,color:"#991b1b"}}>{r.siteId} — Problem</div><div style={{fontSize:12,color:"#b91c1c",marginTop:2}}>{r.engineer} · {(r.notes||"").substring(0,60)}</div></div>
            <span style={{color:"#991b1b",fontSize:18}}>→</span>
          </div>
        ))}

        {/* Filtry */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Site ID or name..." style={{flex:1,minWidth:160,padding:"9px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          {["All","Completed","In Progress","Problem"].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{padding:"7px 12px",borderRadius:10,border:"1.5px solid",borderColor:filter===s?"#f97316":"#e2e8f0",background:filter===s?"#fff7ed":"#fff",color:filter===s?"#ea580c":"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer"}}>{s}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#6b7280"}}>📅 From:</span>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          <span style={{fontSize:12,fontWeight:700,color:"#6b7280"}}>To:</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom("");setDateTo("");}} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid #fca5a5",background:"#fee2e2",color:"#991b1b",fontWeight:700,fontSize:12,cursor:"pointer"}}>✕</button>}
        </div>

        {/* LISTA / DETAL */}
        {selected?(
          <div style={{background:"#fff",borderRadius:16,padding:18,border:"1.5px solid #f1f5f9",display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div style={{fontWeight:900,fontSize:20,color:"#0f172a"}}>{selected.siteId}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{selected.engineer} · {fmtDate(selected.date)} {fmtTime(selected.timestamp)}</div></div>
              <span style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:800,background:(SC[selected.status]||SC["In Progress"]).bg,color:(SC[selected.status]||SC["In Progress"]).text}}>{selected.status}</span>
            </div>
            {[["📍 GPS",selected.gps||"—"],["🔧 Equipment",(selected.equipment||[]).join(", ")],["📝 Notes",selected.notes||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#f8fafc",borderRadius:10,padding:"11px 14px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,color:"#374151",whiteSpace:"pre-wrap"}}>{v}</div>
              </div>
            ))}
            {/* Checklist w detalu */}
            {selected.checklist&&(
              <div style={{background:"#f8fafc",borderRadius:10,padding:"11px 14px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>✓ Checklist ({CHECKLIST_ITEMS.filter(i=>selected.checklist[i.id]).length}/{CHECKLIST_ITEMS.length})</div>
                {CHECKLIST_ITEMS.map(item=>{const done=!!selected.checklist[item.id];return(
                  <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0"}}>
                    <span style={{fontSize:13,color:done?"#10b981":"#ef4444",fontWeight:700}}>{done?"✓":"✗"}</span>
                    <span style={{fontSize:12,color:done?"#374151":"#9ca3af",textDecoration:!done?"line-through":"none"}}>{item.label}</span>
                  </div>
                );})}
              </div>
            )}
            {(selected.photoData||[]).length>0&&(
              <div>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",marginBottom:8}}>📷 Photos ({selected.photos})</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {(selected.photoData||[]).map((p,i)=>{const flags=selected.photoFlags||{};return(
                    <div key={i} onClick={()=>setManagerPhotoViewer({photos:selected.photoData||[],index:i})} style={{borderRadius:8,overflow:"hidden",aspectRatio:"1",border:`2px solid ${flags[i]?"#ef4444":"transparent"}`,position:"relative",cursor:"zoom-in"}}>
                      <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} loading="lazy"/>
                      {flags[i]&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(239,68,68,.85)",color:"#fff",fontSize:9,fontWeight:800,padding:"2px",textAlign:"center"}}>TO FIX</div>}
                    </div>);})}
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {(selected.photoData||[]).length>0&&<button onClick={()=>setModal("photos")} style={{padding:"11px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#6366f1,#4f46e5)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>📷 Review Photos</button>}
              <button onClick={()=>setModal("pdf")} style={{padding:"11px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0f172a,#1e293b)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,gridColumn:(selected.photoData||[]).length===0?"1/3":"auto"}}>🖨 PDF Report</button>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setSelected(null)} style={{flex:1,padding:"11px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:13}}>← Back</button>
              {isAdmin&&<button onClick={async()=>{if(window.confirm(`Delete report ${selected.siteId}? This cannot be undone.`)){await fbDeleteReport(selected.fbKey);setSelected(null);}}} style={{padding:"11px 16px",borderRadius:12,border:"none",background:"#ef4444",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>🗑 Delete</button>}
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>Brak reports</div>}
            {filtered.map(r=>{const sc=SC[r.status]||SC["In Progress"];const flags=r.photoFlags||{};const hasFlagged=Object.values(flags).some(Boolean);const checkDone=CHECKLIST_ITEMS.filter(i=>(r.checklist||{})[i.id]).length;return(
              <div key={r.id} onClick={()=>setSelected(r)} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #f1f5f9",cursor:"pointer",transition:"all .15s",display:"flex",flexDirection:"column",gap:8,animation:"fadeUp .3s ease"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.transform="translateY(-1px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#f1f5f9";e.currentTarget.style.transform="";}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{fontWeight:900,fontSize:15,color:"#111827"}}>{r.siteId}</div>
                      {!r.read&&<span style={{padding:"2px 6px",borderRadius:20,background:"#f97316",color:"#fff",fontSize:10,fontWeight:800}}>NEW</span>}
                      {hasFlagged&&<span style={{padding:"2px 6px",borderRadius:20,background:"#fee2e2",color:"#991b1b",fontSize:10,fontWeight:800}}>⚠️</span>}
                    </div>
                    <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{r.engineer} · {fmtDate(r.date)} · {fmtTime(r.timestamp)}</div>
                  </div>
                  <span style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:800,background:sc.bg,color:sc.text,display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,display:"inline-block"}}></span>{r.status}
                  </span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {(r.equipment||[]).slice(0,3).map(eq=><span key={eq} style={{padding:"2px 8px",borderRadius:20,background:"#f1f5f9",color:"#475569",fontSize:10,fontWeight:600}}>{eq}</span>)}
                    {(r.equipment||[]).length>3&&<span style={{fontSize:10,color:"#9ca3af"}}>+{(r.equipment||[]).length-3}</span>}
                  </div>
                  <div style={{display:"flex",gap:8,fontSize:11,color:"#9ca3af"}}>
                    <span>📷 {r.photos}</span>
                    <span title="Checklist">✓ {checkDone}/{CHECKLIST_ITEMS.length}</span>
                  </div>
                </div>
              </div>);})}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ PDF ══ */
function OperatorReport({report,onClose}){
  const sc=SC[report.status]||SC["In Progress"];
  const [company,setCompany]=useState("Vodafone Ireland");const [contractNo,setContractNo]=useState("");const [notes,setNotes]=useState("");
  const printPDF=()=>{
    const photos=(report.photoData||[]).map(p=>`<img src="${p.url}" style="width:100%;border-radius:6px;aspect-ratio:1;object-fit:cover"/>`).join("");
    const photoGrid=photos?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px">${photos}</div>`:"";
    const checklistRows=CHECKLIST_ITEMS.map(item=>{const done=!!(report.checklist||{})[item.id];return`<tr><td style="padding:5px 0;font-size:12px;color:${done?"#374151":"#9ca3af"}">${item.label}</td><td style="text-align:right;font-weight:800;color:${done?"#10b981":"#ef4444"}">${done?"✓":"✗"}</td></tr>`;}).join("");

    @media print{body{padding:20px}}</style></head><body>
    <div class="hdr"><div><div class="logo">Tower<span>Report</span> Pro</div><div style="font-size:11px;color:#6b7280;margin-top:4px">Field Operations System v4.0</div></div>

    <h1 style="font-size:24px;font-weight:900;color:#0f172a;margin-bottom:6px">Installation Report: ${report.siteId}</h1>

    <tr><td style="width:140px;font-weight:700;color:#6b7280;font-size:11px;text-transform:uppercase">Date</td><td>${fmtDate(report.date)}</td></tr>

    </body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),700);
  };
  const inp2={width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff",boxSiofing:"border-box"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{fontWeight:700,fontSize:14,color:"#374151"}}>Generate operator report</div>

        <textarea style={{...inp2,minHeight:70,resize:"vertical"}} placeholder="Additional notes..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancel</button>
        <button onClick={printPDF} style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0f172a,#1e293b)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>🖨 Generate PDF</button>
      </div>
    </div>
  );
}

/* ══ ROOT APP ══ */
function App(){
  const getSavedRole=()=>{try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");if(s&&Date.now()-s.ts<SESSION_TTL)return s.role;localStorage.removeItem(SESSION_KEY);}catch{}return null;};
  const [role,setRole]=useState(getSavedRole);
  const [reports,setReports]=useState([]);const [tasks,setTasks]=useState([]);
  const [connected,setConnected]=useState(false);const [notifs,setNotifs]=useState([]);
  const [manView,setManView]=useState("dashboard");
  const [appStatus,setAppStatus]=useState(null);
  const nid=useRef(100);const prevIds=useRef(new Set());

  /* All hooks must be before any return */
  const push=useCallback((title,msg,type="ok")=>{
    const id=++nid.current;setNotifs(p=>[...p,{id,title,msg,type}]);
    setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),5000);
  },[]);

  /* ── FIREBASE ANON AUTH — must run before any DB access ── */
  const [authReady,setAuthReady]=useState(!firebaseOK); /* if no firebase, skip wait */
  useEffect(()=>{
    if(!firebaseOK){setAuthReady(true);return;}
    waitForAuth().then(user=>{
      if(user){console.log("Firebase auth OK, uid:",user.uid);}
      else{console.warn("Auth failed - no user");}
      setAuthReady(true);
    });
  },[]);

  /* ── KILL SWITCH ── */
  useEffect(()=>{
    if(!authReady)return; /* wait for auth before checking config */
    if(!firebaseOK){setAppStatus(true);return;}
    const ref=db.ref("config");
    const check=cfg=>{
      if(!cfg){setAppStatus(true);return;}
      if(cfg.expiresAt&&Date.now()>cfg.expiresAt){setAppStatus({blocked:true,reason:cfg.expiredMsg||"Licence expired."});return;}
      setAppStatus(cfg.active===false?{blocked:true,reason:cfg.blockedMsg||"Access blocked."}:true);
    };
    ref.once("value",snap=>check(snap.val()));
    ref.on("value",snap=>check(snap.val()));
    return()=>ref.off();
  },[authReady]);

  useEffect(()=>{
    if(!role)return;
    if(!authReady)return; /* wait for Firebase auth token */
    if(!firebaseOK){push("Offline mode","Configure Firebase","warn");return;}
    const u1=fbSubReports(list=>{
      setConnected(true);
      if(role==="manager"){list.forEach(r=>{if(!prevIds.current.has(r.id)&&prevIds.current.siofe>0){if(r.status==="Problem")push("🚨 Problem!",`${r.siteId} – ${r.engineer}`,"error");else push("📋 New report",`${r.siteId} – ${r.engineer}`,"ok");} prevIds.current.add(r.id);});if(prevIds.current.siofe===0)list.forEach(r=>prevIds.current.add(r.id));}
      setReports(list);
    });
    const u2=fbSubTasks(setTasks);
    const cref=db.ref(".info/connected");cref.on("value",s=>setConnected(!!s.val()));
    return()=>{u1();u2();cref.off();};
  },[role,authReady]);

  useEffect(()=>{
    if(!role)return;
    const remaining=()=>{try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");if(s)return Math.max(0,SESSION_TTL-(Date.now()-s.ts));}catch{}return SESSION_TTL;};
    const t=setTimeout(()=>{setRole(null);localStorage.removeItem(SESSION_KEY);setReports([]);prevIds.current=new Set();},remaining());
    return()=>clearTimeout(t);
  },[role]);

  /* Loading i blocked screens — po wsofystkich hookach */
  if(appStatus===null)return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,#f97316,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📡</div>
      <div style={{color:"#475569",fontSize:13,fontWeight:700}}>Connecting to server...</div>
    </div>
  );
  if(appStatus!==true)return <KillScreen reason={appStatus.reason}/>;

  const handleLogin=r=>{localStorage.setItem(SESSION_KEY,JSON.stringify({role:r,ts:Date.now()}));setRole(r);};
  const handleLogout=()=>{setRole(null);setReports([]);setTasks([]);prevIds.current=new Set();localStorage.removeItem(SESSION_KEY);};
  const handleSubmit=async r=>{
    try{
      if(firebaseOK){
        const ref=await fbPush(r);
        if(!ref||!ref.key)throw new Error("No key returned");
        return{...r,fbKey:ref.key};
      }else{
        setReports(p=>[r,...p]);
        return r;
      }
    }catch(e){
      console.error("Submit error:",e);
      push("Save error","Check internet connection and try again","error");
      return null;
    }
  };
  const flagPhoto=(fbKey,idx,val)=>{if(firebaseOK&&fbKey)fbUpdateReport(fbKey,{[`photoFlags/${idx}`]:val});setReports(p=>p.map(r=>r.fbKey===fbKey?{...r,photoFlags:{...r.photoFlags,[idx]:val}}:r));};
  const unread=reports.filter(r=>!r.read).length;

  if(!role)return <LoginScreen onLogin={handleLogin}/>;

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <Toast notifs={notifs} dismiss={id=>setNotifs(p=>p.filter(n=>n.id!==id))}/>
      <Header role={role} connected={connected} unread={unread} onLogout={handleLogout} onNav={setManView} view={manView}/>
      {role==="engineer"
        ?<EngineerApp reports={reports} tasks={tasks} onSubmit={handleSubmit} push={push}/>
        :<ManagerApp reports={reports} tasks={tasks} onFlagPhoto={flagPhoto} push={push} isAdmin={role==="admin"} view={manView} setView={setManView}/>
      }
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
